var userLabels = {};
var searchVal = '';
var activeFilter = 'all';
var hideCheckedVal = false;

try { userLabels = JSON.parse(localStorage.getItem(LABELS_KEY) || '{}'); } catch(e) {}

function saveLabels() {
  localStorage.setItem(LABELS_KEY, JSON.stringify(userLabels));
}

function updateProgress() {
  var total = data.length;
  var done = Object.keys(userLabels).filter(function(k){ return userLabels[k]; }).length;
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptxt').textContent = 'Проверено: ' + done + ' / ' + total + ' (' + pct + '%)';
}

function getVisible() {
  return data.filter(function(item) {
    var label = userLabels[item.a] || '';
    if (activeFilter === 'unchecked' && label) return false;
    if (activeFilter === 'гладкие' && label !== 'гладкие') return false;
    if (activeFilter === 'рельефные' && label !== 'рельефные') return false;
    if (hideCheckedVal && label) return false;
    if (searchVal && item.n.toLowerCase().indexOf(searchVal.toLowerCase()) === -1) return false;
    return true;
  });
}

function renderCard(item, num) {
  var label = userLabels[item.a] || '';
  var isAuto = !item.surface;
  var cls = 'card';
  if (label === 'гладкие') cls += ' is-smooth';
  else if (label === 'рельефные') cls += ' is-relief';
  var imgUrl = 'https://ceramicadecor.ru/userdata/product/preview/' + item.img + '_500.jpg';
  var autoTag = isAuto ? '<span class="card__auto">авто</span>' : '';
  var btns = ['гладкие','рельефные'].map(function(s) {
    var isActive = label === s ? ' active' : '';
    return '<button class="btn-surf' + isActive + '" data-s="' + s + '" data-a="' + item.a + '">' +
      (s === 'гладкие' ? 'Гладкие' : 'Рельефные') + '</button>';
  }).join('');
  return '<div class="' + cls + '" id="card-' + item._origIdx + '">' +
    '<div class="card__img"><img loading="lazy" src="' + imgUrl + '" alt=""><span class="card__num">' + num + '</span>' + autoTag + '</div>' +
    '<div class="card__body"><div class="card__name">' + item.n + '</div>' +
    '<div class="card__btns">' + btns + '</div></div></div>';
}

function render() {
  var visible = getVisible();
  var html = '';
  for (var i = 0; i < visible.length; i++) {
    html += renderCard(visible[i], data.indexOf(visible[i]) + 1);
  }
  document.getElementById('grid').innerHTML = html;
  updateProgress();
}

document.getElementById('grid').addEventListener('click', function(e) {
  var btn = e.target.closest('.btn-surf');
  if (!btn) return;
  var art = btn.getAttribute('data-a');
  var surf = btn.getAttribute('data-s');
  if (userLabels[art] === surf) {
    delete userLabels[art];
  } else {
    userLabels[art] = surf;
  }
  saveLabels();
  var item = data.find(function(d){ return d.a === art; });
  var card = document.getElementById('card-' + (item ? item._origIdx : ''));
  if (card) {
    var label = userLabels[art] || '';
    card.className = 'card' + (label === 'гладкие' ? ' is-smooth' : label === 'рельефные' ? ' is-relief' : '');
    card.querySelectorAll('.btn-surf').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-s') === label);
    });
  }
  updateProgress();
  if (hideCheckedVal || activeFilter !== 'all') render();
});

document.getElementById('search').addEventListener('input', function() { searchVal = this.value; render(); });
document.getElementById('hideChecked').addEventListener('change', function() { hideCheckedVal = this.checked; render(); });

document.getElementById('filterBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.getAttribute('data-f');
  render();
});

document.getElementById('btnDownload').addEventListener('click', function() {
  var result = {};
  for (var a in userLabels) { if (userLabels[a]) result[a] = userLabels[a]; }
  var blob = new Blob([JSON.stringify(result, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'surface-labels.json'; a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btnReset').addEventListener('click', function() {
  if (!confirm('Сбросить всю разметку?')) return;
  userLabels = {};
  saveLabels();
  render();
});

render();
</script>
